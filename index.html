<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="containerSytle.css" />
  </head>
  <body>
    <div class="shell">
      <div class="selections">
        <h2>Before You Start</h2>
        <h1>Configure Your Quiz</h1>
        <p>
          Select a category, difficulty, number of questions (0 to 20), and
          optional tags.
        </p>

        <div class="select-Items">
          <div class="label-input">
            <label for="category">Category</label>
            <select name="" id="category">
              <option value="">Any Category</option>
              <option value="linux">Linux</option>
              <option value="bash">Bash</option>
              <option value="uncategorized">Uncategorized</option>
              <option value="docker">Docker</option>
              <option value="sql">SQL</option>
              <option value="cms">CMS</option>
              <option value="code">Code</option>
              <option value="devops">DevOps</option>
              <option value="react">React</option>
              <option value="laravel">Laravel</option>
              <option value="postgres">Postgres</option>
              <option value="django">Django</option>
              <option value="cpanel">CPanel</option>
              <option value="nodejs">Nodejs</option>
              <option value="wordpress">WordPress</option>
              <option value="next-js">Nextjs</option>
              <option value="vauejs">VueJS</option>
              <option value="apache-kafka">Apache kafka</option>
              <option value="html">HTML</option>
            </select>
          </div>

          <div class="label-input">
            <label for="difficulty">Difficulty</label>
            <select name="" id="difficulty">
              <option value="">Any</option>
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <div class="label-input">
            <label for="questionsRange">Number Of Questions</label>
            <div class="range-total">
              <input id="questionsRange" type="range" min="0" max="20" />
              <div class="number-of-questions">10</div>
            </div>
          </div>
        </div>

        <button id="renderQuizBtn" class="btn">Render Quiz</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
